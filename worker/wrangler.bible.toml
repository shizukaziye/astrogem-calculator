# wrangler.bible.toml — Cloudflare Worker for the Grader tab's "pull from
# lostark.bible" feature. Separate from wrangler.toml (the Workers-AI vision
# Worker) so the two deploy independently and neither breaks the other.
#
# Fetches a lostark.bible character page server-side with a browser User-Agent
# (the site 403s default fetchers but returns 200 for a browser UA), extracts the
# embedded arkGridCores data, and returns each equipped astrogem as JSON with CORS
# headers. No bindings, no secrets, no external paid API — just an HTML fetch.
#
# Deploy:   cd worker && wrangler deploy --config wrangler.bible.toml
# Local:    cd worker && wrangler dev --config wrangler.bible.toml
#
# After deploy, copy the printed https URL into grader.js (WORKER_URL).

name = "astrogem-bible"
main = "astrogem-bible.js"
compatibility_date = "2026-06-01"

# KV namespace: caches each pulled character (key = "region:name" lowercased) +
# a "__index__" key listing every cached key, so the Leaderboard tab can list all
# stored characters via ?list=1. The Worker degrades gracefully if this binding is
# absent (fetches fresh, no caching). The owner creates the namespace (id below)
# and deploys; see worker/README-bible.md.
[[kv_namespaces]]
binding = "CHARS"
id = "0f51c3b5ac6d45a59186375d62879ad7"

# Rebuild the leaderboard snapshot server-side every 10 minutes (the worker only does the
# expensive full re-read when a character actually changed since the last build).
[triggers]
crons = ["* * * * *"]

# Edge rate-limit bindings (keyed by IP in code; NO KV touched on a blocked hit). period must
# be 10 or 60 seconds. HARD_CAP is the absolute backstop on EVERY request to stop scripted abuse.
[[ratelimits]]
name = "HARD_CAP"
namespace_id = "1000"
[ratelimits.simple]
limit = 60
period = 60

# Free (non-password) pulls: 1 per minute (the 10-per-hour cap is enforced in KV behind this).
[[ratelimits]]
name = "FREE_THROTTLE"
namespace_id = "1001"
[ratelimits.simple]
limit = 1
period = 60

# Password pulls: ~1 per 5s (2 per 10s, since period must be 10 or 60).
[[ratelimits]]
name = "PREMIUM_THROTTLE"
namespace_id = "1002"
[ratelimits.simple]
limit = 2
period = 10

# Leaderboard pulls (open to everyone): 3 per minute, to block spam-refresh.
[[ratelimits]]
name = "LB_THROTTLE"
namespace_id = "1003"
[ratelimits.simple]
limit = 3
period = 60

# GLOBAL overload gate: ONE shared counter across all requests (fixed key in code, not per-IP).
# ~167/min ≈ 10k/hour; when tripped the worker degrades (free cut off, password -> free rate).
# period max is 60s, so this is a rolling per-minute proxy for "10k/hour" that auto-recovers.
[[ratelimits]]
name = "GLOBAL_GATE"
namespace_id = "1004"
[ratelimits.simple]
limit = 1000
period = 60

# Global enqueue cap: ~2 NEW characters queued per minute site-wide, matching the drain rate so the
# queue (and thus monthly writes) can never grow faster than we empty it. period must be 10 or 60.
[[ratelimits]]
name = "ENQUEUE_GATE"
namespace_id = "1005"
[ratelimits.simple]
limit = 2
period = 60

# Observability (logs) — optional, handy while validating the parser.
[observability]
enabled = true

# --- Optional: lock CORS to your Pages origin instead of "*" ---
# The Worker hardcodes ALLOW_ORIGIN = "*" (see TODO in astrogem-bible.js). To
# restrict it without editing source you could read an env var; left commented to
# keep the default zero-config.
# [vars]
# ALLOW_ORIGIN = "https://astrogem-calculator.pages.dev"
